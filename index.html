        <h1>Jordan's Campsite</h1>
        <p>
          A cosy 3D camping scene built with React Three Fiber.
          Sit inside a tent on a rainy night &mdash; there's a lantern overhead,
          a cat strolling past, a campfire crackling outside, and a laptop
          with my projects. Enable JavaScript to experience the full
          interactive scene.
        </p>

        <div class="ns-note">
          This site is an interactive 3D experience that requires JavaScript.
          Below is a text version of everything you'd find inside the tent.
        </div>

        <h2>About</h2>
        <p>
          Hi, I'm Jordan Mackie. This is my personal website &mdash; a geocities-style
          art experiment disguised as a camping trip. The scene has a day/night
          cycle, spatial audio, and a few things to click on.
        </p>

        <h2>Links</h2>
        <ul>
          <li><a href="https://github.com/TheDuckGoesQuark">GitHub</a></li>
        </ul>

        <h2>What's in the tent</h2>
        <ul>
          <li>A laptop with my projects</li>
          <li>An acoustic guitar</li>
          <li>A moka pot for coffee</li>
          <li>A notepad</li>
          <li>A midi controller and audio interface for making music</li>
          <li>A lantern you can toggle on and off</li>
          <li>A cat named Smittens who wanders past</li>
          <li>A campfire and picnic area outside</li>
        </ul>

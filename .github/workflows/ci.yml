name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -r exec tsc -b

      - name: Run tests
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: campsite
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d campsite"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: backend
        run: poetry install

      - name: Run migrations
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql://postgres:postgres_password@localhost:5432/campsite
          DEBUG: '1'
        run: poetry run python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql://postgres:postgres_password@localhost:5432/campsite
          DEBUG: '1'
        run: poetry run python -m pytest -v

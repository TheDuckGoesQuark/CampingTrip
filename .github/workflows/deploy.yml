name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  build-web-image:
    runs-on: ubuntu-24.04-arm  # Native arm64 — no QEMU cross-compile
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: backend
          target: production
          push: true
          build-args: |
            COMMIT_HASH=${{ steps.meta.outputs.image_tag }}
          tags: |
            ${{ vars.ECR_WEB_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ vars.ECR_WEB_REPO }}:latest
          cache-from: |
            type=gha,scope=web-arm
            type=registry,ref=${{ vars.ECR_WEB_REPO }}:latest
          cache-to: type=gha,mode=max,scope=web-arm

  build-web-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Vite app
        run: npm run build

      - name: Upload web app artifact
        uses: actions/upload-artifact@v6
        with:
          name: webapp
          path: dist/
          retention-days: 1

  deploy:
    needs: [build-web-image, build-web-app]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download web app artifact
        uses: actions/download-artifact@v7
        with:
          name: webapp
          path: webapp

      - name: Upload web app to S3
        run: |
          tar czf webapp.tar.gz -C webapp .
          aws s3 cp webapp.tar.gz s3://${{ vars.S3_DEPLOY_BUCKET }}/_deploy/webapp.tar.gz

      - name: Find EC2 instance by tag
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=jordanscamp" "Name=tag:Environment,Values=prod" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "::error::No running jordanscamp production instance found"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Found instance: $INSTANCE_ID"

      - name: Deploy via SSM Run Command
        id: deploy
        run: |
          INSTANCE_ID="${{ steps.ec2.outputs.instance_id }}"
          IMAGE_TAG="${{ needs.build-web-image.outputs.image_tag }}"
          ECR_WEB_REPO="${{ vars.ECR_WEB_REPO }}"
          S3_BUCKET="${{ vars.S3_DEPLOY_BUCKET }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'cd /opt/jordanscamp',
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $(echo $ECR_WEB_REPO | cut -d/ -f1)',
              'export ECR_WEB_REPO=$ECR_WEB_REPO',
              'export IMAGE_TAG=$IMAGE_TAG',
              'docker compose -f docker-compose.prod.yml pull',
              'docker compose -f docker-compose.prod.yml run --rm web python3 manage.py migrate --no-input',
              'docker compose -f docker-compose.prod.yml up -d',
              'aws s3 cp s3://$S3_BUCKET/_deploy/webapp.tar.gz /tmp/webapp.tar.gz',
              'rm -rf /opt/jordanscamp/webapp/*',
              'tar xzf /tmp/webapp.tar.gz -C /opt/jordanscamp/webapp/',
              'rm /tmp/webapp.tar.gz',
              'systemctl restart caddy',
              'sleep 5',
              'curl -f http://localhost:8000/health/ || exit 1',
              'docker image prune -f'
            ]" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "Sent SSM command: $COMMAND_ID"

      - name: Wait for deployment
        run: |
          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"
          INSTANCE_ID="${{ steps.ec2.outputs.instance_id }}"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "[$i/60] Status: $STATUS"

            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac

            sleep 10
          done

          echo "::group::Deploy stdout"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text || true
          echo "::endgroup::"

          echo "::group::Deploy stderr"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" --output text || true
          echo "::endgroup::"

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deployment failed with status: $STATUS"
            exit 1
          fi

          echo "Deployment successful!"

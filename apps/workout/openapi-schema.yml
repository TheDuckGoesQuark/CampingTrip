          minimum: 0
          description: Number of warm-up sets before working sets (0 = none)
        warmup_start_pct:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Starting weight percentage for warm-up sets (e.g. 20 = 20%)
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - level
    LadderNodeRequest:

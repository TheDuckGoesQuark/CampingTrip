components:
  schemas:
    ChartDataResponse:
      type: object
      properties:
        volume_per_session:
          type: array
          items:
            type: object
            additionalProperties: {}
        weight_per_exercise:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - volume_per_session
      - weight_per_exercise
    CompleteSessionResponse:
      type: object
      properties:
        session:
          $ref: '#/components/schemas/WorkoutSessionDetail'
        progression_updates:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - progression_updates
      - session
    Criterion:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type:
          $ref: '#/components/schemas/CriterionTypeEnum'
        params:
          description: 'Shape determined by type, e.g. {"sets": 3, "reps": 10}'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - params
      - type
    CriterionRequest:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CriterionTypeEnum'
        params:
          description: 'Shape determined by type, e.g. {"sets": 3, "reps": 10}'
      required:
      - params
      - type
    CriterionTypeEnum:
      enum:
      - min_reps_sets
      - min_weight
      - sustained_sessions
      - min_duration
      type: string
      description: |-
        * `min_reps_sets` - Minimum reps & sets
        * `min_weight` - Minimum weight
        * `sustained_sessions` - Sustained over sessions
        * `min_duration` - Minimum duration
    DashboardResponse:
      type: object
      properties:
        total_sessions:
          type: integer
        completed_sessions:
          type: integer
        total_ladders:
          type: integer
        achieved_nodes:
          type: integer
        today_session:
          allOf:
          - $ref: '#/components/schemas/WorkoutSessionDetail'
          nullable: true
        today_plan_exercises:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - achieved_nodes
      - completed_sessions
      - total_ladders
      - total_sessions
    DayOfWeekEnum:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      type: integer
      description: |-
        * `0` - Monday
        * `1` - Tuesday
        * `2` - Wednesday
        * `3` - Thursday
        * `4` - Friday
        * `5` - Saturday
        * `6` - Sunday
    Exercise:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        description:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - name
    ExerciseRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
      required:
      - name
    ExerciseSet:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        set_number:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_warmup_set:
          type: boolean
        type:
          $ref: '#/components/schemas/ExerciseSetTypeEnum'
        value:
          description: 'Shape determined by type, e.g. {"reps": 10, "weight": 20}'
        completed:
          type: boolean
        completed_at:
          type: string
          format: date-time
          nullable: true
        rest_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - set_number
      - type
      - value
    ExerciseSetRequest:
      type: object
      properties:
        set_number:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_warmup_set:
          type: boolean
        type:
          $ref: '#/components/schemas/ExerciseSetTypeEnum'
        value:
          description: 'Shape determined by type, e.g. {"reps": 10, "weight": 20}'
        completed:
          type: boolean
        completed_at:
          type: string
          format: date-time
          nullable: true
        rest_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - set_number
      - type
      - value
    ExerciseSetTypeEnum:
      enum:
      - reps_weight
      - reps_only
      - duration
      - distance
      type: string
      description: |-
        * `reps_weight` - Reps & Weight
        * `reps_only` - Reps Only
        * `duration` - Duration
        * `distance` - Distance
    GenerateSessionRequestRequest:
      type: object
      properties:
        date:
          type: string
          format: date
    LadderDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/LadderNode'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    LadderDetailRequest:
      type: object
      properties:
        description:
          type: string
    LadderList:

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: campsite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campsite"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: development
    volumes:
      - .:/home/app
      - static_volume:/home/app/static
      - media_volume:/home/app/media
    ports:
      - "8002:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-simple-key-for-development-only
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/campsite
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    command: >
      sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false

  celery-worker:
    build:
      context: .
      target: development
    command: ["celery", "-A", "campsite", "worker", "--loglevel=info", "--concurrency=2"]
    volumes:
      - .:/home/app
      - static_volume:/home/app/static
      - media_volume:/home/app/media
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-simple-key-for-development-only
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/campsite
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data:
